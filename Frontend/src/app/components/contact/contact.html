<section id="contact" class="contact-section section-padding">
  <div class="container">
    <div class="section-header">
      <h4 class="section-tag">Get In Touch</h4>
      <h2 class="section-title">Let's Create <span class="text-gradient">Something Great</span></h2>
    </div>

    <div class="contact-grid">
      <div class="contact-info">
        <h3 class="info-title">Contact Information</h3>
        <p class="info-desc">Feel free to reach out for collaborations, project inquiries, or just to say hi!</p>

        <div class="info-cards">
          <a *ngFor="let info of contactInfo" [href]="info.link" class="info-card glass">
            <div class="icon-box">
              <lucide-icon [name]="info.icon" size="20"></lucide-icon>
            </div>
            <div class="details">
              <span class="label">{{ info.label }}</span>
              <span class="value">{{ info.value }}</span>
            </div>
          </a>
        </div>

        <div class="availability glass">
          <div class="status-dot-container">
            <div class="status-dot"></div>
          </div>
          <span>Available for new opportunities</span>
        </div>
      </div>

      <div class="contact-form-container glass">
        <form #contactForm="ngForm" (ngSubmit)="onSubmit()" class="contact-form">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Your Name">
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="Your Email">
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="5" placeholder="Your Message"></textarea>
          </div>

          <button type="submit" [disabled]="!contactForm.form.valid" class="btn btn-primary submit-btn">
            <span>Send Message</span>
            <lucide-icon [name]="SendIcon" size="18"></lucide-icon>
          </button>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <p>&copy; By Naivedh Patel</p>
      </div>
    </div>
  </footer>
</section>
